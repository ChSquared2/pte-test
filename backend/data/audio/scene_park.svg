<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Arial, sans-serif">
  <!-- Sky -->
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9"/>
      <stop offset="100%" style="stop-color:#87CEEB"/>
    </linearGradient>
  </defs>
  <rect width="800" height="280" fill="url(#sky)"/>
  <!-- Sun -->
  <circle cx="650" cy="70" r="35" fill="#FFD700"/>
  <!-- Clouds -->
  <ellipse cx="200" cy="50" rx="50" ry="20" fill="white" opacity="0.8"/>
  <ellipse cx="170" cy="45" rx="35" ry="18" fill="white" opacity="0.8"/>
  <ellipse cx="500" cy="70" rx="45" ry="18" fill="white" opacity="0.8"/>
  <!-- Grass -->
  <rect x="0" y="270" width="800" height="230" fill="#4CAF50"/>
  <!-- Pond -->
  <ellipse cx="600" cy="360" rx="100" ry="50" fill="#4a90d9" opacity="0.7"/>
  <ellipse cx="580" cy="355" rx="60" ry="25" fill="#5ba0e9" opacity="0.5"/>
  <!-- Ducks in pond -->
  <ellipse cx="570" cy="350" rx="10" ry="6" fill="#FFD700"/>
  <circle cx="563" cy="346" r="5" fill="#FFD700"/>
  <polygon points="558,346 553,344 558,343" fill="#ff6600"/>
  <ellipse cx="620" cy="365" rx="8" ry="5" fill="#FFD700"/>
  <circle cx="614" cy="362" r="4" fill="#FFD700"/>
  <!-- Large tree left -->
  <rect x="60" y="180" width="25" height="100" fill="#5D4037"/>
  <circle cx="72" cy="160" r="55" fill="#2E7D32"/>
  <circle cx="40" cy="175" r="35" fill="#388E3C"/>
  <circle cx="105" cy="170" r="40" fill="#388E3C"/>
  <!-- Large tree right -->
  <rect x="700" y="190" width="20" height="90" fill="#5D4037"/>
  <circle cx="710" cy="170" r="50" fill="#2E7D32"/>
  <circle cx="680" cy="180" r="35" fill="#388E3C"/>
  <!-- Bench -->
  <rect x="180" y="330" width="80" height="8" rx="2" fill="#5D4037"/>
  <rect x="185" y="338" width="8" height="20" fill="#5D4037"/>
  <rect x="247" y="338" width="8" height="20" fill="#5D4037"/>
  <rect x="180" y="320" width="5" height="18" fill="#5D4037"/>
  <rect x="255" y="320" width="5" height="18" fill="#5D4037"/>
  <rect x="180" y="318" width="80" height="5" rx="2" fill="#5D4037"/>
  <!-- Person sitting on bench reading -->
  <circle cx="210" cy="305" r="10" fill="#fdd9b5"/>
  <rect x="202" y="315" width="16" height="20" rx="2" fill="#2196F3"/>
  <rect x="215" y="320" width="15" height="10" fill="white" stroke="#999"/>
  <!-- Jogger -->
  <circle cx="400" cy="300" r="11" fill="#8d5524"/>
  <rect x="392" y="311" width="16" height="22" rx="2" fill="#ff5722"/>
  <rect x="388" y="333" width="10" height="22" fill="#333"/>
  <rect x="402" y="333" width="10" height="22" fill="#333"/>
  <line x1="392" y1="318" x2="378" y2="310" stroke="#8d5524" stroke-width="3"/>
  <line x1="408" y1="318" x2="420" y2="308" stroke="#8d5524" stroke-width="3"/>
  <!-- Family having picnic -->
  <rect x="300" y="390" width="70" height="45" rx="3" fill="#ff5722" opacity="0.6"/>
  <!-- Parent 1 -->
  <circle cx="295" cy="375" r="11" fill="#fdd9b5"/>
  <rect x="286" y="386" width="18" height="25" rx="2" fill="#9C27B0"/>
  <!-- Parent 2 -->
  <circle cx="365" cy="378" r="11" fill="#c68642"/>
  <rect x="356" y="389" width="18" height="25" rx="2" fill="#3F51B5"/>
  <!-- Child playing -->
  <circle cx="340" cy="380" r="8" fill="#fdd9b5"/>
  <rect x="334" y="388" width="12" height="16" rx="2" fill="#E91E63"/>
  <!-- Picnic items -->
  <circle cx="315" cy="400" r="6" fill="#ff9800"/>
  <rect x="330" y="398" width="12" height="8" rx="1" fill="#795548"/>
  <circle cx="355" cy="402" r="5" fill="#f44336"/>
  <!-- Kids playing with ball -->
  <circle cx="470" cy="420" r="8" fill="#fdd9b5"/>
  <rect x="464" y="428" width="12" height="16" rx="2" fill="#00BCD4"/>
  <circle cx="510" cy="418" r="9" fill="#8d5524"/>
  <rect x="503" y="427" width="14" height="18" rx="2" fill="#FF9800"/>
  <circle cx="490" cy="408" r="8" fill="#ff5722"/>
  <!-- Dog running -->
  <ellipse cx="150" cy="400" rx="18" ry="10" fill="#795548"/>
  <circle cx="133" cy="393" r="7" fill="#795548"/>
  <circle cx="130" cy="390" r="2" fill="#333"/>
  <line x1="168" y1="398" x2="180" y2="393" stroke="#795548" stroke-width="2"/>
  <rect x="138" y="408" width="4" height="12" fill="#795548"/>
  <rect x="148" y="408" width="4" height="12" fill="#795548"/>
  <rect x="155" y="408" width="4" height="12" fill="#795548"/>
  <!-- Person walking dog -->
  <circle cx="130" cy="370" r="10" fill="#fdd9b5"/>
  <rect x="122" y="380" width="16" height="25" rx="2" fill="#607D8B"/>
  <rect x="118" y="405" width="10" height="22" fill="#455A64"/>
  <rect x="132" y="405" width="10" height="22" fill="#455A64"/>
  <line x1="138" y1="390" x2="150" y2="395" stroke="#333" stroke-width="1.5"/>
  <!-- Playground in background -->
  <!-- Slide -->
  <rect x="720" y="300" width="5" height="50" fill="#f44336"/>
  <rect x="755" y="300" width="5" height="50" fill="#f44336"/>
  <rect x="720" y="300" width="40" height="5" fill="#f44336"/>
  <line x1="760" y1="305" x2="780" y2="350" stroke="#ff9800" stroke-width="4"/>
  <!-- Swing -->
  <rect x="680" y="290" width="5" height="60" fill="#795548"/>
  <rect x="660" y="290" width="5" height="60" fill="#795548"/>
  <rect x="655" y="288" width="35" height="5" fill="#795548"/>
  <line x1="665" y1="293" x2="668" y2="330" stroke="#333" stroke-width="2"/>
  <line x1="685" y1="293" x2="682" y2="330" stroke="#333" stroke-width="2"/>
  <rect x="663" y="328" width="10" height="4" rx="1" fill="#795548"/>
  <rect x="677" y="328" width="10" height="4" rx="1" fill="#795548"/>
  <!-- Path -->
  <path d="M 0,420 Q 200,400 400,430 Q 600,460 800,440" fill="none" stroke="#bcaaa4" stroke-width="25" opacity="0.6"/>
  <!-- Flowers -->
  <circle cx="250" cy="440" r="4" fill="#E91E63"/>
  <circle cx="260" cy="445" r="3" fill="#FF9800"/>
  <circle cx="245" cy="448" r="4" fill="#9C27B0"/>
  <circle cx="430" cy="455" r="3" fill="#E91E63"/>
  <circle cx="440" cy="460" r="4" fill="#FFEB3B"/>
  <circle cx="450" cy="452" r="3" fill="#FF5722"/>
</svg>
