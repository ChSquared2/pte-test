<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Arial, sans-serif">
  <!-- Background - classroom -->
  <rect width="800" height="500" fill="#f5f0e8"/>
  <!-- Floor -->
  <rect x="0" y="350" width="800" height="150" fill="#c4a882"/>
  <!-- Back wall -->
  <rect x="0" y="0" width="800" height="350" fill="#e8e0d0"/>
  <!-- Whiteboard -->
  <rect x="200" y="30" width="400" height="180" rx="5" fill="white" stroke="#666" stroke-width="3"/>
  <text x="280" y="90" font-size="18" fill="#333">E = mc²</text>
  <text x="260" y="130" font-size="14" fill="#0066cc">Physics Lesson 12</text>
  <line x1="250" y1="150" x2="550" y2="150" stroke="#cc0000" stroke-width="2"/>
  <text x="250" y="175" font-size="12" fill="#333">Newton's Laws of Motion</text>
  <!-- Clock -->
  <circle cx="680" cy="60" r="30" fill="white" stroke="#333" stroke-width="2"/>
  <line x1="680" y1="60" x2="680" y2="38" stroke="#333" stroke-width="2"/>
  <line x1="680" y1="60" x2="695" y2="55" stroke="#333" stroke-width="1.5"/>
  <text x="670" y="100" font-size="10" fill="#666">2:30</text>
  <!-- Teacher desk -->
  <rect x="300" y="240" width="200" height="40" rx="3" fill="#8B6914"/>
  <rect x="310" y="250" width="60" height="25" rx="2" fill="#d0d0d0" stroke="#999"/>
  <!-- Teacher (standing) -->
  <circle cx="520" cy="220" r="18" fill="#fdd9b5"/>
  <rect x="505" y="238" width="30" height="45" rx="3" fill="#2255aa"/>
  <rect x="500" y="283" width="15" height="35" fill="#333"/>
  <rect x="520" y="283" width="15" height="35" fill="#333"/>
  <line x1="505" y1="250" x2="480" y2="270" stroke="#fdd9b5" stroke-width="4"/>
  <line x1="535" y1="250" x2="560" y2="240" stroke="#fdd9b5" stroke-width="4"/>
  <!-- Student desks row 1 -->
  <rect x="80" y="340" width="120" height="30" rx="3" fill="#a0886e"/>
  <rect x="250" y="340" width="120" height="30" rx="3" fill="#a0886e"/>
  <rect x="420" y="340" width="120" height="30" rx="3" fill="#a0886e"/>
  <rect x="590" y="340" width="120" height="30" rx="3" fill="#a0886e"/>
  <!-- Student 1 (writing) -->
  <circle cx="140" cy="315" r="14" fill="#fdd9b5"/>
  <rect x="128" y="329" width="24" height="20" rx="2" fill="#cc3333"/>
  <rect x="100" y="345" width="30" height="8" rx="1" fill="white" stroke="#ddd"/>
  <!-- Student 2 (raising hand) -->
  <circle cx="310" cy="315" r="14" fill="#8d5524"/>
  <rect x="298" y="329" width="24" height="20" rx="2" fill="#33aa55"/>
  <line x1="322" y1="329" x2="335" y2="295" stroke="#8d5524" stroke-width="4"/>
  <!-- Student 3 (reading) -->
  <circle cx="480" cy="315" r="14" fill="#fdd9b5"/>
  <rect x="468" y="329" width="24" height="20" rx="2" fill="#aa33cc"/>
  <rect x="455" y="345" width="40" height="8" rx="1" fill="#ffe0b0"/>
  <!-- Student 4 (looking at board) -->
  <circle cx="650" cy="315" r="14" fill="#c68642"/>
  <rect x="638" y="329" width="24" height="20" rx="2" fill="#3366cc"/>
  <!-- Student desks row 2 -->
  <rect x="80" y="420" width="120" height="30" rx="3" fill="#a0886e"/>
  <rect x="250" y="420" width="120" height="30" rx="3" fill="#a0886e"/>
  <rect x="420" y="420" width="120" height="30" rx="3" fill="#a0886e"/>
  <!-- Student 5 -->
  <circle cx="140" cy="395" r="14" fill="#c68642"/>
  <rect x="128" y="409" width="24" height="20" rx="2" fill="#ff9933"/>
  <!-- Student 6 (sleeping) -->
  <circle cx="310" cy="400" r="14" fill="#fdd9b5"/>
  <rect x="298" y="414" width="24" height="16" rx="2" fill="#666"/>
  <text x="330" y="398" font-size="10" fill="#999">zzz</text>
  <!-- Student 7 -->
  <circle cx="480" cy="395" r="14" fill="#8d5524"/>
  <rect x="468" y="409" width="24" height="20" rx="2" fill="#cc6699"/>
  <!-- Window -->
  <rect x="30" y="40" width="100" height="120" rx="3" fill="#87CEEB" stroke="#666" stroke-width="2"/>
  <line x1="80" y1="40" x2="80" y2="160" stroke="#666" stroke-width="2"/>
  <line x1="30" y1="100" x2="130" y2="100" stroke="#666" stroke-width="2"/>
  <circle cx="60" cy="70" r="15" fill="#FFD700"/>
  <!-- Bookshelf -->
  <rect x="650" y="140" width="120" height="100" fill="#8B6914" stroke="#5a4510" stroke-width="2"/>
  <rect x="655" y="145" width="25" height="30" fill="#cc3333"/>
  <rect x="682" y="145" width="20" height="30" fill="#3366cc"/>
  <rect x="704" y="145" width="25" height="30" fill="#33aa55"/>
  <rect x="731" y="145" width="25" height="30" fill="#ff9933"/>
  <rect x="655" y="185" width="30" height="25" fill="#aa33cc"/>
  <rect x="688" y="185" width="22" height="25" fill="#cc6633"/>
  <rect x="713" y="185" width="28" height="25" fill="#336699"/>
</svg>
