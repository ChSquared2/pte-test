<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Arial, sans-serif">
  <!-- Sky -->
  <rect width="800" height="300" fill="#87CEEB"/>
  <circle cx="700" cy="60" r="40" fill="#FFD700"/>
  <!-- Clouds -->
  <ellipse cx="150" cy="60" rx="60" ry="25" fill="white"/>
  <ellipse cx="120" cy="50" rx="40" ry="20" fill="white"/>
  <ellipse cx="400" cy="80" rx="50" ry="20" fill="white"/>
  <!-- Ground -->
  <rect x="0" y="300" width="800" height="200" fill="#d4c4a0"/>
  <!-- Road -->
  <rect x="0" y="380" width="800" height="120" fill="#888"/>
  <rect x="350" y="435" width="40" height="8" fill="#FFD700"/>
  <rect x="450" y="435" width="40" height="8" fill="#FFD700"/>
  <rect x="250" y="435" width="40" height="8" fill="#FFD700"/>
  <rect x="550" y="435" width="40" height="8" fill="#FFD700"/>
  <!-- Market stalls -->
  <!-- Fruit stall -->
  <rect x="30" y="200" width="160" height="100" fill="#8B6914"/>
  <polygon points="30,200 110,150 190,200" fill="#cc3333"/>
  <text x="70" y="185" font-size="12" fill="white" font-weight="bold">FRUITS</text>
  <circle cx="60" cy="260" r="12" fill="#ff3333"/>
  <circle cx="90" cy="265" r="10" fill="#ff9933"/>
  <circle cx="115" cy="260" r="12" fill="#ffcc00"/>
  <circle cx="145" cy="265" r="10" fill="#33cc33"/>
  <circle cx="75" cy="280" r="8" fill="#9933cc"/>
  <circle cx="130" cy="280" r="10" fill="#ff6666"/>
  <!-- Vegetable stall -->
  <rect x="220" y="210" width="160" height="90" fill="#8B6914"/>
  <polygon points="220,210 300,160 380,210" fill="#33aa55"/>
  <text x="250" y="195" font-size="12" fill="white" font-weight="bold">VEGETABLES</text>
  <rect x="240" y="240" width="20" height="30" rx="3" fill="#ff6600"/>
  <rect x="265" y="245" width="18" height="25" rx="3" fill="#cc0000"/>
  <ellipse cx="310" cy="260" rx="15" ry="10" fill="#33cc33"/>
  <ellipse cx="345" cy="255" rx="12" ry="15" fill="#9933cc"/>
  <!-- Fish stall -->
  <rect x="420" y="205" width="150" height="95" fill="#8B6914"/>
  <polygon points="420,205 495,155 570,205" fill="#3366cc"/>
  <text x="460" y="190" font-size="12" fill="white" font-weight="bold">FISH</text>
  <ellipse cx="460" cy="255" rx="25" ry="10" fill="#c0c0c0"/>
  <ellipse cx="520" cy="260" rx="20" ry="8" fill="#a0a0a0"/>
  <!-- Flower stall -->
  <rect x="610" y="215" width="150" height="85" fill="#8B6914"/>
  <polygon points="610,215 685,165 760,215" fill="#ff66aa"/>
  <text x="640" y="200" font-size="12" fill="white" font-weight="bold">FLOWERS</text>
  <circle cx="640" cy="255" r="10" fill="#ff3366"/>
  <circle cx="665" cy="250" r="12" fill="#ffcc00"/>
  <circle cx="695" cy="255" r="10" fill="#ff66cc"/>
  <circle cx="720" cy="250" r="11" fill="#cc33ff"/>
  <circle cx="740" cy="260" r="9" fill="#ff9999"/>
  <!-- People shopping -->
  <!-- Woman with basket -->
  <circle cx="100" cy="320" r="12" fill="#fdd9b5"/>
  <rect x="90" y="332" width="20" height="30" rx="2" fill="#ff6699"/>
  <rect x="85" y="362" width="12" height="25" fill="#333"/>
  <rect x="100" y="362" width="12" height="25" fill="#333"/>
  <ellipse cx="120" cy="345" rx="12" ry="8" fill="#8B6914"/>
  <!-- Man pointing -->
  <circle cx="280" cy="315" r="14" fill="#8d5524"/>
  <rect x="268" y="329" width="24" height="35" rx="2" fill="#336699"/>
  <rect x="263" y="364" width="14" height="28" fill="#333"/>
  <rect x="280" y="364" width="14" height="28" fill="#333"/>
  <line x1="292" y1="340" x2="320" y2="320" stroke="#8d5524" stroke-width="4"/>
  <!-- Child with mother -->
  <circle cx="500" cy="325" r="10" fill="#fdd9b5"/>
  <rect x="492" y="335" width="16" height="22" rx="2" fill="#ff9933"/>
  <rect x="488" y="357" width="10" height="18" fill="#3366cc"/>
  <rect x="502" y="357" width="10" height="18" fill="#3366cc"/>
  <circle cx="530" cy="310" r="13" fill="#fdd9b5"/>
  <rect x="519" y="323" width="22" height="32" rx="2" fill="#cc3366"/>
  <rect x="515" y="355" width="13" height="28" fill="#333"/>
  <rect x="530" y="355" width="13" height="28" fill="#333"/>
  <line x1="505" y1="345" x2="519" y2="340" stroke="#fdd9b5" stroke-width="3"/>
  <!-- Old man with cane -->
  <circle cx="680" cy="318" r="12" fill="#fdd9b5"/>
  <rect x="670" y="330" width="20" height="30" rx="2" fill="#666"/>
  <rect x="666" y="360" width="12" height="25" fill="#444"/>
  <rect x="680" y="360" width="12" height="25" fill="#444"/>
  <line x1="695" y1="340" x2="700" y2="390" stroke="#8B6914" stroke-width="3"/>
  <!-- Dog -->
  <ellipse cx="170" cy="375" rx="20" ry="12" fill="#c68642"/>
  <circle cx="150" cy="368" r="8" fill="#c68642"/>
  <circle cx="147" cy="365" r="2" fill="#333"/>
  <line x1="190" y1="372" x2="205" y2="368" stroke="#c68642" stroke-width="3"/>
  <!-- Bicycle -->
  <circle cx="620" cy="410" r="18" fill="none" stroke="#333" stroke-width="2"/>
  <circle cx="670" cy="410" r="18" fill="none" stroke="#333" stroke-width="2"/>
  <line x1="620" y1="410" x2="645" y2="390" stroke="#333" stroke-width="2"/>
  <line x1="670" y1="410" x2="645" y2="390" stroke="#333" stroke-width="2"/>
  <line x1="645" y1="390" x2="635" y2="375" stroke="#333" stroke-width="2"/>
  <!-- Trees -->
  <rect x="5" y="250" width="12" height="50" fill="#8B6914"/>
  <circle cx="11" cy="235" r="25" fill="#228B22"/>
  <rect x="780" y="240" width="12" height="60" fill="#8B6914"/>
  <circle cx="786" cy="225" r="28" fill="#228B22"/>
</svg>
