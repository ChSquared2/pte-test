<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Arial, sans-serif">
  <!-- Background - outdoor scene -->
  <rect width="800" height="500" fill="#87ceeb"/>
  <!-- Grass -->
  <rect x="0" y="350" width="800" height="150" fill="#4CAF50"/>
  <rect x="0" y="340" width="800" height="20" fill="#66BB6A"/>
  <!-- Sun -->
  <circle cx="700" cy="80" r="45" fill="#FFD700"/>
  <line x1="700" y1="20" x2="700" y2="5" stroke="#FFD700" stroke-width="3"/>
  <line x1="740" y1="40" x2="755" y2="30" stroke="#FFD700" stroke-width="3"/>
  <line x1="755" y1="80" x2="770" y2="80" stroke="#FFD700" stroke-width="3"/>
  <line x1="740" y1="120" x2="755" y2="130" stroke="#FFD700" stroke-width="3"/>
  <!-- Cloud -->
  <ellipse cx="200" cy="60" rx="60" ry="25" fill="white"/>
  <ellipse cx="170" cy="50" rx="40" ry="20" fill="white"/>
  <ellipse cx="230" cy="50" rx="35" ry="18" fill="white"/>
  <!-- Banner -->
  <rect x="150" y="100" width="500" height="80" rx="5" fill="white" stroke="#e74c3c" stroke-width="3"/>
  <text x="230" y="135" font-size="22" font-weight="bold" fill="#e74c3c">COMMUNITY HEALTH</text>
  <text x="300" y="165" font-size="16" fill="#333">Free Check-ups Today!</text>
  <!-- Medical tent -->
  <polygon points="50,200 200,120 350,200" fill="#e74c3c"/>
  <rect x="70" y="200" width="260" height="140" fill="white" stroke="#ccc" stroke-width="2"/>
  <rect x="170" y="260" width="60" height="80" fill="#e74c3c" rx="3"/>
  <!-- Red cross -->
  <rect x="130" y="220" width="40" height="12" rx="2" fill="#e74c3c"/>
  <rect x="144" y="208" width="12" height="36" rx="2" fill="#e74c3c"/>
  <!-- Information booth -->
  <rect x="450" y="220" width="180" height="120" rx="3" fill="#3498db"/>
  <rect x="460" y="230" width="160" height="40" fill="white" rx="2"/>
  <text x="480" y="255" font-size="12" font-weight="bold" fill="#3498db">INFO BOOTH</text>
  <rect x="470" y="280" width="60" height="10" fill="white" rx="1"/>
  <rect x="470" y="295" width="60" height="10" fill="white" rx="1"/>
  <rect x="470" y="310" width="60" height="10" fill="white" rx="1"/>
  <!-- Doctor -->
  <circle cx="280" cy="280" r="16" fill="#fdd9b5"/>
  <rect x="265" y="296" width="30" height="44" rx="3" fill="white"/>
  <rect x="260" y="340" width="14" height="30" fill="#335"/>
  <rect x="282" y="340" width="14" height="30" fill="#335"/>
  <circle cx="295" cy="298" r="8" fill="#e74c3c"/>
  <!-- Stethoscope -->
  <path d="M270,310 Q260,320 265,330" fill="none" stroke="#333" stroke-width="2"/>
  <!-- Person 1 getting checked -->
  <circle cx="380" cy="300" r="16" fill="#c68642"/>
  <rect x="365" y="316" width="30" height="44" rx="3" fill="#2196F3"/>
  <rect x="360" y="360" width="14" height="25" fill="#333"/>
  <rect x="382" y="360" width="14" height="25" fill="#333"/>
  <!-- Person 2 walking -->
  <circle cx="550" cy="310" r="14" fill="#fdd9b5"/>
  <rect x="537" y="324" width="26" height="38" rx="3" fill="#9C27B0"/>
  <rect x="535" y="362" width="12" height="25" fill="#333"/>
  <rect x="555" y="362" width="12" height="25" fill="#333"/>
  <!-- Person 3 with child -->
  <circle cx="680" cy="305" r="15" fill="#8d5524"/>
  <rect x="667" y="320" width="28" height="40" rx="3" fill="#FF9800"/>
  <rect x="664" y="360" width="13" height="25" fill="#333"/>
  <rect x="684" y="360" width="13" height="25" fill="#333"/>
  <!-- Child -->
  <circle cx="710" cy="330" r="10" fill="#c68642"/>
  <rect x="702" y="340" width="16" height="25" rx="2" fill="#FFEB3B"/>
  <rect x="700" y="365" width="8" height="18" fill="#333"/>
  <rect x="712" y="365" width="8" height="18" fill="#333"/>
  <!-- Trees -->
  <rect x="30" y="350" width="15" height="40" fill="#795548"/>
  <circle cx="37" cy="330" r="30" fill="#2E7D32"/>
  <rect x="750" y="340" width="12" height="50" fill="#795548"/>
  <circle cx="756" cy="320" r="25" fill="#388E3C"/>
  <!-- Balloons -->
  <ellipse cx="420" cy="200" rx="15" ry="20" fill="#e74c3c"/>
  <line x1="420" y1="220" x2="420" y2="260" stroke="#999" stroke-width="1"/>
  <ellipse cx="440" cy="190" rx="15" ry="20" fill="#2196F3"/>
  <line x1="440" y1="210" x2="435" y2="260" stroke="#999" stroke-width="1"/>
</svg>
