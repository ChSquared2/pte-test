<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="800" height="500" fill="#e8eef5"/>
  <!-- Floor -->
  <rect x="0" y="380" width="800" height="120" fill="#c0c0c0"/>
  <!-- Back wall -->
  <rect x="0" y="0" width="800" height="380" fill="#dde5ed"/>
  <!-- Window -->
  <rect x="50" y="30" width="150" height="120" rx="3" fill="#b0d4f1" stroke="#888" stroke-width="2"/>
  <line x1="125" y1="30" x2="125" y2="150" stroke="#888" stroke-width="2"/>
  <line x1="50" y1="90" x2="200" y2="90" stroke="#888" stroke-width="2"/>
  <!-- Lab bench 1 -->
  <rect x="60" y="250" width="300" height="25" rx="3" fill="#2c2c2c"/>
  <rect x="70" y="275" width="15" height="105" fill="#444"/>
  <rect x="340" y="275" width="15" height="105" fill="#444"/>
  <!-- Lab bench 2 -->
  <rect x="440" y="250" width="300" height="25" rx="3" fill="#2c2c2c"/>
  <rect x="450" y="275" width="15" height="105" fill="#444"/>
  <rect x="720" y="275" width="15" height="105" fill="#444"/>
  <!-- Beaker 1 -->
  <rect x="100" y="210" width="40" height="40" rx="2" fill="rgba(173,216,230,0.6)" stroke="#69a" stroke-width="2"/>
  <rect x="105" y="230" width="30" height="20" fill="rgba(0,150,200,0.4)"/>
  <!-- Flask -->
  <polygon points="200,210 180,250 220,250" fill="rgba(200,230,200,0.6)" stroke="#6a6" stroke-width="2"/>
  <rect x="195" y="195" width="10" height="20" fill="rgba(200,230,200,0.6)" stroke="#6a6" stroke-width="2"/>
  <rect x="185" y="235" width="30" height="15" fill="rgba(100,200,100,0.4)"/>
  <!-- Microscope -->
  <rect x="290" y="220" width="50" height="30" rx="3" fill="#333"/>
  <rect x="310" y="180" width="10" height="40" fill="#555"/>
  <circle cx="315" cy="175" r="12" fill="#444" stroke="#666" stroke-width="2"/>
  <rect x="295" y="230" width="40" height="5" fill="#222"/>
  <!-- Bunsen burner -->
  <rect x="480" y="230" width="20" height="20" rx="2" fill="#777"/>
  <rect x="485" y="210" width="10" height="20" fill="#888"/>
  <polygon points="490,210 480,190 500,190" fill="#ff6633" opacity="0.8"/>
  <polygon points="490,205 485,195 495,195" fill="#ffcc00" opacity="0.9"/>
  <!-- Test tubes rack -->
  <rect x="560" y="225" width="80" height="25" rx="2" fill="#8B6914"/>
  <rect x="570" y="200" width="10" height="30" rx="5" fill="rgba(255,100,100,0.5)" stroke="#c66" stroke-width="1"/>
  <rect x="590" y="200" width="10" height="30" rx="5" fill="rgba(100,100,255,0.5)" stroke="#66c" stroke-width="1"/>
  <rect x="610" y="200" width="10" height="30" rx="5" fill="rgba(100,255,100,0.5)" stroke="#6c6" stroke-width="1"/>
  <rect x="630" y="200" width="10" height="30" rx="5" fill="rgba(255,255,100,0.5)" stroke="#cc6" stroke-width="1"/>
  <!-- Scientist 1 -->
  <circle cx="160" cy="170" r="18" fill="#fdd9b5"/>
  <rect x="145" y="188" width="30" height="50" rx="3" fill="white"/>
  <rect x="140" y="238" width="15" height="35" fill="#335"/>
  <rect x="165" y="238" width="15" height="35" fill="#335"/>
  <!-- Safety goggles -->
  <rect x="148" y="164" width="24" height="10" rx="4" fill="rgba(200,200,255,0.7)" stroke="#669" stroke-width="1"/>
  <!-- Scientist 2 -->
  <circle cx="520" cy="170" r="18" fill="#c68642"/>
  <rect x="505" y="188" width="30" height="50" rx="3" fill="white"/>
  <rect x="500" y="238" width="15" height="35" fill="#335"/>
  <rect x="525" y="238" width="15" height="35" fill="#335"/>
  <!-- Safety goggles -->
  <rect x="508" y="164" width="24" height="10" rx="4" fill="rgba(200,200,255,0.7)" stroke="#669" stroke-width="1"/>
  <!-- Periodic table poster -->
  <rect x="300" y="30" width="200" height="130" rx="3" fill="white" stroke="#888" stroke-width="2"/>
  <text x="340" y="55" font-size="14" font-weight="bold" fill="#333">Periodic Table</text>
  <rect x="310" y="65" width="15" height="12" fill="#ff6b6b" rx="1"/><text x="313" y="74" font-size="6" fill="white">H</text>
  <rect x="330" y="65" width="15" height="12" fill="#4ecdc4" rx="1"/><text x="333" y="74" font-size="6" fill="white">He</text>
  <rect x="350" y="65" width="15" height="12" fill="#45b7d1" rx="1"/><text x="353" y="74" font-size="6" fill="white">Li</text>
  <rect x="370" y="65" width="15" height="12" fill="#96ceb4" rx="1"/><text x="373" y="74" font-size="6" fill="white">Be</text>
  <rect x="310" y="82" width="15" height="12" fill="#ffeaa7" rx="1"/><text x="313" y="91" font-size="6" fill="#333">B</text>
  <rect x="330" y="82" width="15" height="12" fill="#dda0dd" rx="1"/><text x="333" y="91" font-size="6" fill="white">C</text>
  <rect x="350" y="82" width="15" height="12" fill="#98d8c8" rx="1"/><text x="353" y="91" font-size="6" fill="white">N</text>
  <rect x="370" y="82" width="15" height="12" fill="#ff7675" rx="1"/><text x="373" y="91" font-size="6" fill="white">O</text>
  <!-- Safety sign -->
  <rect x="620" y="40" width="100" height="60" rx="5" fill="#ffcc00" stroke="#cc9900" stroke-width="2"/>
  <text x="635" y="65" font-size="11" font-weight="bold" fill="#333">⚠ SAFETY</text>
  <text x="640" y="85" font-size="9" fill="#555">Wear goggles</text>
</svg>
